  collection: ^1.19.1
  dartantic_interface: ^4.0.0
  googleai_dart: ^5.0.0
  html: ^0.15.6
  http: ^1.6.0
  logging: ^1.3.0
  mcp_dart: ^2.0.0
  meta: ^1.17.0
  mime: ^2.0.0
  mistralai_dart: ^1.2.0
  ollama_dart: ^1.2.0
  openai_dart: ^1.1.0
  rxdart: ^0.28.0
  sse_channel: ^0.2.2
  uuid: ^4.5.2

dev_dependencies:
  all_lint_rules_community: ^0.0.43
  test: ^1.28.0
