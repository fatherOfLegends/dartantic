name: dartantic_chat
description: >-
  AI chat widget for Flutter apps targeting mobile, desktop, and web supporting
  text, image, and voice input.
version: 0.3.0
repository: https://github.com/csells/dartantic/tree/main/packages/dartantic_chat
resolution: workspace

topics:
  - ai
  - chat
  - gemini

environment:
  sdk: ^3.10.0

dependencies:
  cross_file: ^0.3.5+1
  dartantic_ai: ^3.0.0
  dartantic_interface: ^4.0.0
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_context_menu: ^0.4.1
  flutter_markdown_plus: ^1.0.7
  flutter_picture_taker: ^0.2.0
  google_fonts: ^8.0.1
  image_picker: ^1.2.1
  mac_menu_bar: ^0.0.3
  mime: ^2.0.0
  super_clipboard: ^0.9.1
  super_drag_and_drop: ^0.9.1
  universal_platform: ^1.1.0
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  waveform_recorder: ^1.8.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  fonts:
    - family: FatIcons
      fonts:
        - asset: lib/fonts/FatIcons.ttf
