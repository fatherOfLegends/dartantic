name: dartantic_firebase_ai
description: >
  Firebase AI provider for dartantic_ai. Provides access to Google's Gemini
  models through Firebase with App Check security and Firebase Auth
  integration.
version: 0.2.0
repository: https://github.com/csells/dartantic_ai
homepage: https://docs.dartantic.ai
issue_tracker: https://github.com/csells/dartantic_ai/issues

environment:
  sdk: ^3.10.0

dependencies:
  dartantic_interface: ^4.0.0
  firebase_ai: ^3.8.0
  firebase_app_check: ^0.4.0
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  logging: ^1.3.0
  meta: ^1.17.0
  uuid: ^4.5.2

dev_dependencies:
  all_lint_rules_community: ^0.0.43
  firebase_core_platform_interface: ^6.0.2
  flutter_test:
    sdk: flutter
  test: ^1.26.3
